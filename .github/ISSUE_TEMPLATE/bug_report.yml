name: Bug report
description: Report a bug or regression in CRIEW
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem in CRIEW.

        English is preferred for public issues. Chinese is also acceptable if that is easier.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched the existing issues
          required: true
        - label: I checked the current wiki, README, or README-zh
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one or two sentences.
      placeholder: CRIEW fails to ...
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What happens today?
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, repeatable sequence.
      placeholder: |
        1. Configure CRIEW with ...
        2. Run `criew ...`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in what you can.
      value: |
        - OS:
        - Installation method:
        - CRIEW version:
        - Git version:
        - Python version:
        - b4 availability:
        - git send-email availability:
      render: markdown
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or output
      description: Paste relevant logs or terminal output here. You can also drag files into the issue after it is created.
      render: shell
    validations:
      required: false
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Anything else that would help reproduce or debug the issue.
    validations:
      required: false
