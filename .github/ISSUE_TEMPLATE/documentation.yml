name: Documentation issue
description: Report a docs gap, inaccuracy, or missing explanation
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Courier documentation.

        English is preferred for public issues. Chinese is also acceptable if that is easier.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched the existing issues
          required: true
  - type: input
    id: location
    attributes:
      label: Affected document
      description: Which file, page, or section is involved?
      placeholder: README.md, README-zh.md, docs/config.example.toml, ...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
      description: Describe the docs problem clearly.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: What should the docs say instead?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or examples that would help.
    validations:
      required: false
