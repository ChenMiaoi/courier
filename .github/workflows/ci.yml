name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint And Test (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            should_check_commit_messages: true
          - runner: macos-15
            should_check_commit_messages: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check commit messages
        if: matrix.should_check_commit_messages
        env:
          CI_COMMIT_BEFORE: ${{ github.event.before }}
          CI_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CI_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/check-commit-messages.sh

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps

      - name: Test
        run: cargo test --all-targets --all-features

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage
        run: ./scripts/check-coverage.sh

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            target/coverage/lcov.info
            target/coverage/html
          if-no-files-found: error

  release-target-builds:
    name: Release Target Build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            build_target: x86_64-unknown-linux-gnu
            build_subcommand: build
            binary_name: criew
            should_smoke_test: true
          - artifact_name: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            build_target: aarch64-unknown-linux-gnu
            build_subcommand: zigbuild
            use_zigbuild: true
            binary_name: criew
            should_smoke_test: false
          - artifact_name: riscv64gc-unknown-linux-gnu
            runner: ubuntu-latest
            build_target: riscv64gc-unknown-linux-gnu
            build_subcommand: zigbuild
            use_zigbuild: true
            binary_name: criew
            should_smoke_test: false
          - artifact_name: aarch64-apple-darwin
            runner: macos-15
            build_target: aarch64-apple-darwin
            build_subcommand: build
            binary_name: criew
            should_smoke_test: true
          - artifact_name: x86_64-apple-darwin
            runner: macos-15-intel
            build_target: x86_64-apple-darwin
            build_subcommand: build
            binary_name: criew
            should_smoke_test: true
          - artifact_name: x86_64-pc-windows-msvc
            runner: windows-latest
            build_target: x86_64-pc-windows-msvc
            build_subcommand: build
            binary_name: criew.exe
            should_smoke_test: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.build_target }}

      - name: Setup Zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build target binary
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.build_target }}
          BUILD_SUBCOMMAND: ${{ matrix.build_subcommand }}
        run: cargo "${BUILD_SUBCOMMAND}" --locked --target "${BUILD_TARGET}" --package criew --bin criew

      - name: Smoke test native binary
        if: matrix.should_smoke_test
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.build_target }}
          BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          binary_path="target/${BUILD_TARGET}/debug/${BINARY_NAME}"
          "${binary_path}" --help >/dev/null

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - lint-and-test
      - coverage
      - release-target-builds
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: release-source
            runner: ubuntu-latest
          - artifact_name: release-x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            build_target: x86_64-unknown-linux-gnu
            build_subcommand: build
          - artifact_name: release-aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            build_target: aarch64-unknown-linux-gnu
            build_subcommand: zigbuild
            use_zigbuild: true
          - artifact_name: release-riscv64gc-unknown-linux-gnu
            runner: ubuntu-latest
            build_target: riscv64gc-unknown-linux-gnu
            build_subcommand: zigbuild
            use_zigbuild: true
          - artifact_name: release-aarch64-apple-darwin
            runner: macos-15
            build_target: aarch64-apple-darwin
            build_subcommand: build
          - artifact_name: release-x86_64-apple-darwin
            runner: macos-15-intel
            build_target: x86_64-apple-darwin
            build_subcommand: build
          - artifact_name: release-x86_64-pc-windows-msvc
            runner: windows-latest
            build_target: x86_64-pc-windows-msvc
            build_subcommand: build
    name: Release Asset (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        if: matrix.build_target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.build_target }}

      - name: Setup Zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Cache cargo
        if: matrix.build_target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        if: matrix.build_target
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.build_target }}
          BUILD_SUBCOMMAND: ${{ matrix.build_subcommand }}
        run: cargo "${BUILD_SUBCOMMAND}" --locked --release --target "${BUILD_TARGET}" --package criew --bin criew

      - name: Prepare source release assets
        if: ${{ !matrix.build_target }}
        shell: bash
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: ./scripts/package-release-assets.sh "${GIT_TAG}" dist/release

      - name: Prepare binary release assets
        if: matrix.build_target
        shell: bash
        env:
          GIT_TAG: ${{ github.ref_name }}
          BUILD_TARGET: ${{ matrix.build_target }}
        run: ./scripts/package-binary-release-assets.sh "${GIT_TAG}" "${BUILD_TARGET}" dist/release

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/release
          if-no-files-found: error

  publish-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist/release
          merge-multiple: true

      - name: Generate release checksums
        shell: bash
        run: ./scripts/generate-release-checksums.sh dist/release/SHA256SUMS dist/release

      - name: Generate release notes
        shell: bash
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: ./scripts/generate-release-notes.sh "${GIT_TAG}" dist/release/release-notes.md dist/release

      - name: Publish release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_TAG: ${{ github.ref_name }}
        run: |
          release_title="CRIEW ${GIT_TAG}"
          notes_file="dist/release/release-notes.md"
          mapfile -t release_assets < <(
            find dist/release -maxdepth 1 -type f ! -name 'release-notes.md' | sort
          )

          if [[ "${#release_assets[@]}" -eq 0 ]]; then
            printf '%s\n' "no release assets were downloaded" >&2
            exit 1
          fi

          if gh release view "${GIT_TAG}" >/dev/null 2>&1; then
            gh release upload "${GIT_TAG}" "${release_assets[@]}" --clobber
            gh release edit "${GIT_TAG}" \
              --title "${release_title}" \
              --notes-file "${notes_file}"
          else
            gh release create "${GIT_TAG}" "${release_assets[@]}" \
              --title "${release_title}" \
              --notes-file "${notes_file}"
          fi
