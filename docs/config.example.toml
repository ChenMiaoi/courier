# Courier config example (minimal).
# Default config path: ~/.courier/courier-config.toml
# Relative paths are resolved from the config file directory.

[storage]
# Optional runtime root, default is ~/.courier
# data_dir = "~/.courier"

# Required to customize DB location. Default: ~/.courier/db/courier.db
database = "./.courier/db/courier.db"

# Required to customize patch file location. Default: ~/.courier/patches
patch_dir = "./.courier/patches"

[logging]
# Required to customize log directory. Default: ~/.courier/logs
dir = "./.courier/logs"
filter = "info"

[b4]
# Optional. When omitted, Courier tries vendor/b4/b4.sh and then b4 in PATH.
# path = "./vendor/b4/b4.sh"

[source]
# Optional lore base URL.
# lore_base_url = "https://lore.kernel.org"

[ui]
# Optional. Whether to auto-sync enabled subscriptions after TUI starts.
# Default: true
# startup_sync = true

[kernel]
# Optional. Single kernel tree root path shown in left pane tree view (Tab toggles).
# tree = "/path/to/linux"

# Optional. Multiple kernel tree roots; each appears as a top-level root in tree view.
# trees = ["/path/to/linux", "/path/to/linux-next"]
